---
# Integration tests for ibm.storage_protect.hsm_client_install module
# Validates install, upgrade, and uninstall flows for Linux targets.
# HSM Client requires GPFS and BA Client as prerequisites.

- name: Install HSM Client (Fresh Install)
  hosts: all
  become: true
  tasks:
    - name: Install HSM Client for first time
      ibm.storage_protect.hsm_client_install:
        state: present
        version: "8.1.23.0"
        package_source: "{{ lookup('env', 'HSM_CLIENT_PKG_PATH') }}"
        start_daemon: true
        bypass_gpfs_check: false
      register: install_result

    - name: Verify HSM Client installed successfully
      assert:
        that:
          - install_result.changed
          - "'successfully' in install_result.msg or install_result.is_installation_successful"
        fail_msg: "HSM Client installation failed or did not report success"

    - name: Run again to check idempotency (should make no changes)
      ibm.storage_protect.hsm_client_install:
        state: present
        version: "8.1.23.0"
        package_source: "{{ lookup('env', 'HSM_CLIENT_PKG_PATH') }}"
      register: idempotent_result

    - name: Assert module is idempotent
      assert:
        that:
          - not idempotent_result.changed
        fail_msg: "HSM Client install not idempotent"

# -------------------------------------------------------------------

- name: Upgrade HSM Client
  hosts: all
  become: true
  tasks:
    - name: Perform upgrade to next version
      ibm.storage_protect.hsm_client_install:
        state: upgrade
        version: "8.1.24.0"
        package_source: "{{ lookup('env', 'HSM_CLIENT_PKG_PATH') }}"
        start_daemon: true
      register: upgrade_result

    - name: Validate upgrade completed successfully
      assert:
        that:
          - upgrade_result.changed
          - "'upgraded' in upgrade_result.msg or upgrade_result.is_installation_successful"
        fail_msg: "HSM Client upgrade failed or message not returned properly"

# -------------------------------------------------------------------

- name: Uninstall HSM Client
  hosts: all
  become: true
  tasks:
    - name: Remove HSM Client
      ibm.storage_protect.hsm_client_install:
        state: absent
      register: uninstall_result

    - name: Validate HSM Client removed successfully
      assert:
        that:
          - uninstall_result.changed
          - "'uninstalled' in uninstall_result.msg or uninstall_result.hsm_client_version is not defined"
        fail_msg: "HSM Client uninstall failed or still detected"

# -------------------------------------------------------------------

- name: Negative Test - Invalid Version Parameter
  hosts: all
  become: true
  tasks:
    - name: Try upgrade without version argument
      ibm.storage_protect.hsm_client_install:
        state: upgrade
        package_source: "{{ lookup('env', 'HSM_CLIENT_PKG_PATH') }}"
      register: invalid_upgrade
      ignore_errors: true

    - name: Validate module fails with proper error
      assert:
        that:
          - invalid_upgrade.failed
          - "'version parameter required' in invalid_upgrade.msg"
        fail_msg: "Module did not properly fail when version missing for upgrade"

# -------------------------------------------------------------------

- name: Negative Test - Missing GPFS Prerequisite
  hosts: all
  become: true
  tasks:
    - name: Try install without GPFS (should fail unless bypassed)
      ibm.storage_protect.hsm_client_install:
        state: present
        version: "8.1.23.0"
        package_source: "{{ lookup('env', 'HSM_CLIENT_PKG_PATH') }}"
        bypass_gpfs_check: false
      register: gpfs_check_result
      ignore_errors: true

    - name: Validate GPFS check works (fails if GPFS not installed)
      assert:
        that:
          - gpfs_check_result.failed or gpfs_check_result.changed
        fail_msg: "GPFS prerequisite check did not work as expected"

# -------------------------------------------------------------------

- name: Positive Test - Bypass GPFS Check
  hosts: all
  become: true
  tasks:
    - name: Install with GPFS check bypassed
      ibm.storage_protect.hsm_client_install:
        state: present
        version: "8.1.23.0"
        package_source: "{{ lookup('env', 'HSM_CLIENT_PKG_PATH') }}"
        bypass_gpfs_check: true
      register: bypass_result

    - name: Validate installation works with bypass
      assert:
        that:
          - bypass_result.changed or not bypass_result.failed
        fail_msg: "Installation with GPFS bypass did not work"

# -------------------------------------------------------------------

- name: Test HSM Client Facts Gathering
  hosts: all
  become: true
  tasks:
    - name: Gather HSM Client facts
      ibm.storage_protect.hsm_client_facts:
      register: facts_result

    - name: Validate facts were gathered
      assert:
        that:
          - facts_result.hsm_packages is defined
          - facts_result.hsm_packages | length > 0
        fail_msg: "HSM Client facts not gathered properly"

    - name: Display HSM Client version info
      debug:
        msg: "HSM Client version: {{ facts_result.hsm_client_version | default('Not installed') }}"

# -------------------------------------------------------------------

- name: Test Rollback on Failed Upgrade
  hosts: all
  become: true
  tasks:
    - name: Get current version before upgrade attempt
      ibm.storage_protect.hsm_client_facts:
      register: pre_upgrade_facts

    - name: Attempt upgrade with invalid package (should trigger rollback)
      ibm.storage_protect.hsm_client_install:
        state: upgrade
        version: "99.99.99.0"
        package_source: "/invalid/path"
      register: failed_upgrade
      ignore_errors: true

    - name: Verify upgrade failed
      assert:
        that:
          - failed_upgrade.failed
        fail_msg: "Invalid upgrade should have failed"

    - name: Get version after failed upgrade
      ibm.storage_protect.hsm_client_facts:
      register: post_rollback_facts

    - name: Verify rollback restored original version
      assert:
        that:
          - pre_upgrade_facts.hsm_client_version == post_rollback_facts.hsm_client_version
        fail_msg: "Rollback did not restore original version"


