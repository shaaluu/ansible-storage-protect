---
- name: Uninstall HSM Client on AIX
  hosts: "{{ target_hosts | default('aix') }}"
  gather_facts: yes
  become: true

  vars_files:
    - ../../vars/main.yml

  tasks:
    - name: Uninstall HSM Client
      hsm_client_install:
        hsm_client_version: "{{ hsm_client_version }}"
        state: absent
        package_source: "{{ aix_package_source }}"
        install_path: "{{ hsm_install_path }}"
        temp_dir: "{{ hsm_temp_dir }}"
      register: uninstall_result

    - name: Show uninstallation result
      debug:
        var: uninstall_result