---
- name: Install IBM Storage Protect Operations Center
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: true
  become: "{{ ansible_os_family != 'Windows' }}"

  vars_prompt:
    - name: gsa_username
      prompt: "IBM GSA username (for artifact download)"
      private: false
    - name: gsa_password
      prompt: "IBM GSA password"
      private: true
    - name: ssl_password
      prompt: "OC SSL password (HTTPS endpoint)"
      private: true

  vars:
    oc_version: "8.2.1.000"
    gsa_base_url: "http://tucgsa.ibm.com/projects/t/tsmsrv_drvs/8.2.1.000/NextGenUI/"
    configure: false

  tasks:
    - name: Install Operations Center
      ibm.storage_protect.oc_install:
        state: present
        oc_version: "{{ oc_version }}"
        gsa_base_url: "{{ gsa_base_url }}"
        gsa_username: "{{ gsa_username }}"
        gsa_password: "{{ gsa_password }}"
        oc_install_dest: "{{ oc_install_dest | default('/opt/oc_binary') }}"
        ssl_password: "{{ ssl_password }}"
        secure_port: "{{ secure_port | default('9443') }}"
        configure: "{{ configure | default(false) }}"
        admin_name: "{{ admin_name | default(omit) }}"
        artifact_path: "{{ artifact_path | default(omit) }}"
      register: oc_install_result

    - name: Show Operations Center status
      ansible.builtin.debug:
        msg:
          changed: "{{ oc_install_result.changed }}"
          installed_version: "{{ oc_install_result.installed_version | default('') }}"
          msg: "{{ oc_install_result.msg }}"
          success: "{{ oc_install_result.success | default(false) }}"
          validation: "{{ oc_install_result.validation | default({}) }}"
