---
# Check if HSM Client is already installed
- name: Check if HSM Client is already installed
  ansible.builtin.command: rpm -q TIVsm-HSM
  register: hsm_client_check
  ignore_errors: true
  changed_when: false

# Displaying the installation status
- name: Display HSM Client status
  ansible.builtin.debug:
    msg: "HSM Client is already installed. Skipping installation. Installed Version -> {{ hsm_client_check.stdout }}"
  when: hsm_client_check is defined and hsm_client_check.rc == 0 and hsm_client_action == "install"

# Skipping the installation if HSM Client is already installed
- name: Fail or Skip Installation
  ansible.builtin.meta: end_play
  when: hsm_client_check is defined and hsm_client_check.rc == 0 and hsm_client_action == "install"

# ================= Pre-checks ==========================
# Note: GPFS prerequisite check is now performed in main.yml before this task

- name: Warning message if GPFS check is skipped
  ansible.builtin.debug:
    msg: |
      ⚠️  WARNING: GPFS prerequisite check has been skipped!
      HSM Client will be installed but will NOT function without GPFS.
      This should only be used for testing the Ansible automation.
  when: not (gpfs_is_installed | default(true)) and (skip_gpfs_check | default(false))

# System Compatibility checks for installing the HSM client
- name: Checking architecture compatibility
  ansible.builtin.set_fact:
    architecture_compatible: "{{ (system_info.Architecture | first) in sp_server_compatible_architectures }}"

- name: Checking available disk space
  ansible.builtin.set_fact:
    avail_disk_space: "{{ disk_space.available_mb | int > 1500 }}"

- name: Compatibility results
  ansible.builtin.debug:
    msg: |
      Architecture check: {{ architecture_compatible }}
      Disk Space: {{ avail_disk_space }}

- name: Compatibility check result
  ansible.builtin.debug:
    msg: "System is compatible"
  when: architecture_compatible and avail_disk_space

- name: Compatibility check result
  ansible.builtin.debug:
    msg: "System is incompatible"
  when: not (architecture_compatible and avail_disk_space)

- name: Fail if system is incompatible
  ansible.builtin.fail:
    msg: >
      System compatibility checks failed. Please ensure the following
      requirements are met: - Compatible architecture: x86_64, s390x, ppc64le
      - Sufficient disk space: > 1400 MB
      Architecture check: {{ architecture_compatible }}
      Disk Space: {{ avail_disk_space }}
  when: not (architecture_compatible and avail_disk_space)

- name: Install rsync on remote VMs
  ansible.builtin.package:
    name: rsync
    state: present

- name: Install lsof on remote VMs
  ansible.builtin.package:
    name: lsof
    state: present

# ====================== Transferring packages on remote vm's ======================

# Check if tar file already exists on remote host at temp destination
- name: Check if tar file already exists on remote host at temp destination
  ansible.builtin.stat:
    path: "{{ hsm_client_temp_dest }}{{ tar_file_path | basename }}"
  register: remote_tar_file_temp

# Check if tar file exists at the specified path on remote host (in-place)
- name: Check if tar file exists at specified path on remote host
  ansible.builtin.stat:
    path: "{{ tar_file_path }}"
  register: remote_tar_file_inplace
  when: tar_file_location == 'remote'

# Check if tar file exists on Ansible controller
- name: Check if tar file exists on Ansible controller
  ansible.builtin.stat:
    path: "{{ tar_file_path }}"
  delegate_to: localhost
  register: local_tar_file
  ignore_errors: true
  when: tar_file_location == 'controller'

- name: Display file transfer status
  ansible.builtin.debug:
    msg: |
      ========================================
      HSM Package Transfer Status
      ========================================
      Source: {{ tar_file_path }}
      Destination: {{ hsm_client_temp_dest }}{{ tar_file_path | basename }}
      
      File location: {{ tar_file_location }}
      File on controller: {{ 'Found' if (tar_file_location == 'controller' and local_tar_file.stat.exists | default(false)) else 'N/A' }}
      File on remote (in-place): {{ 'Found' if (tar_file_location == 'remote' and remote_tar_file_inplace.stat.exists | default(false)) else 'N/A' }}
      File on remote (temp): {{ 'Already exists' if remote_tar_file_temp.stat.exists else 'Not found' }}
      
      Action: {{ 'Using file in-place on remote' if (tar_file_location == 'remote' and remote_tar_file_inplace.stat.exists | default(false)) else ('Skipping transfer (file already in temp)' if remote_tar_file_temp.stat.exists else ('Transferring file...' if (tar_file_location == 'controller' and local_tar_file.stat.exists | default(false)) else 'File not found')) }}
      ========================================

# Transfer files only if not already on remote and exists on controller
- name: Transferring the packages on the remote host
  ansible.builtin.copy:
    src: "{{ tar_file_path }}"
    dest: "{{ hsm_client_temp_dest }}"
    mode: '0644'
  when:
    - architecture_compatible and avail_disk_space
    - tar_file_location == 'controller'
    - not remote_tar_file_temp.stat.exists
    - local_tar_file.stat.exists | default(false)
  register: copy_result

- name: Display transfer completion
  ansible.builtin.debug:
    msg: |
      ========================================
      ✅ HSM Package Transfer COMPLETED
      ========================================
      File successfully transferred to: {{ hsm_client_temp_dest }}
      Transfer time: {{ copy_result.delta if copy_result.delta is defined else 'N/A' }}
      ========================================
  when: copy_result is defined and copy_result.changed

- name: Display skip message when file already exists on remote temp
  ansible.builtin.debug:
    msg: |
      ========================================
      ℹ️  HSM Package Transfer SKIPPED
      ========================================
      File already exists on remote host: {{ hsm_client_temp_dest }}{{ tar_file_path | basename }}
      Skipping transfer and using existing file.
      ========================================
  when: remote_tar_file_temp.stat.exists

- name: Display message when using file in-place on remote
  ansible.builtin.debug:
    msg: |
      ========================================
      ℹ️  Using HSM Package In-Place
      ========================================
      File location: {{ tar_file_path }}
      Using file directly from its current location on remote host.
      No copy to temp directory needed.
      ========================================
  when:
    - tar_file_location == 'remote'
    - remote_tar_file_inplace.stat.exists | default(false)
    - not remote_tar_file_temp.stat.exists

# Set the actual tar file path to use for installation
- name: Set actual tar file path for installation
  ansible.builtin.set_fact:
    actual_tar_file_path: "{{ tar_file_path if (tar_file_location == 'remote' and remote_tar_file_inplace.stat.exists | default(false)) else (hsm_client_temp_dest + (tar_file_path | basename)) }}"

# Validate that tar file is available (either transferred, already present, or in-place)
- name: Validate tar file availability on remote
  ansible.builtin.stat:
    path: "{{ actual_tar_file_path }}"
  register: final_tar_check

- name: Fail if tar file is not available on remote host
  ansible.builtin.fail:
    msg: |
      ========================================
      ❌ HSM Package Not Available
      ========================================
      The HSM Client tar file is not available on the remote host.
      
      Expected location: {{ actual_tar_file_path }}
      
      Please ensure either:
      1. The tar file exists on the Ansible controller at: {{ tar_file_path }}
      2. OR the tar file is already present on the remote host at: {{ actual_tar_file_path }}
      
      Current status:
      - File location: {{ tar_file_location }}
      - File on controller: {{ 'Found' if (tar_file_location == 'controller' and local_tar_file.stat.exists | default(false)) else 'N/A' }}
      - File on remote: {{ 'Not found' if not final_tar_check.stat.exists else 'Found' }}
      ========================================
  when: not final_tar_check.stat.exists

# ======= Extracting and finding the packages on remote vm's =======

# creating a temporary directory to extract the .rpm files
- name: Remove existing /opt/hsmClient directory
  ansible.builtin.file:
    path: "{{ hsm_client_extract_dest }}"
    state: absent

- name: Creating /opt/hsmClient directory
  ansible.builtin.file:
    path: "{{ hsm_client_extract_dest }}"
    state: directory
    mode: '0755'
  when: architecture_compatible and avail_disk_space

- name: Extracting the .tar file
  ansible.builtin.unarchive:
    src: "{{ actual_tar_file_path }}"
    dest: "{{ hsm_client_extract_dest }}"
    remote_src: true
  when: architecture_compatible and avail_disk_space
  register: extraction_result

- name: Finding extracted files
  ansible.builtin.find:
    paths: /opt/hsmClient
    recurse: true
  register: extracted_files

- name: List of extracted files
  ansible.builtin.debug:
    msg: "Extracted files: {{ extracted_files.files | map(attribute='path') | list }}"
  when: extracted_files is defined and extracted_files.files | length > 0

# ===== Checking whether the packages are already installed or not to maintain the idempotency ====

# Checking if GSKit cryptographic library (gskcrypt) is installed
- name: Checking if GSKit cryptographic library (gskcrypt) is installed
  ansible.builtin.command: rpm -q gskcrypt64
  register: check_gskcrypt
  failed_when: false
  changed_when: false

# Checking if GSKit SSL library (gskssl) is installed
- name: Checking if GSKit SSL library (gskssl) is installed
  ansible.builtin.command: rpm -q gskssl64
  register: check_gskssl
  failed_when: false
  changed_when: false

- name: Checking if TIVsm-API64 is installed
  ansible.builtin.command: rpm -q TIVsm-API64
  register: check_api64
  failed_when: false
  changed_when: false

- name: Checking if TIVsm-APIcit is installed
  ansible.builtin.command: rpm -q TIVsm-APIcit
  register: check_apicit
  failed_when: false
  changed_when: false

- name: Checking if TIVsm-BA is installed
  ansible.builtin.command: rpm -q TIVsm-BA
  register: check_ba
  failed_when: false
  changed_when: false

- name: Checking if TIVsm-BAcit is installed
  ansible.builtin.command: rpm -q TIVsm-BAcit
  register: check_bacit
  failed_when: false
  changed_when: false

- name: Checking if HSM package is installed or not
  ansible.builtin.command: rpm -q TIVsm-HSM
  register: check_hsm
  failed_when: false
  changed_when: false

# ===== Installing packages in sequence =====

- name: Installing packages
  block:
    # Installing GSKit crypt library (gskcrypt) - use -Uvh to upgrade if already installed
    # Sort by path to get the latest version (higher version number comes last)
    - name: Install or upgrade GSKit crypt library (gskcrypt)
      ansible.builtin.command: rpm -Uvh {{ item }}
      with_items: >
        {{ extracted_files.files | map(attribute='path')
              | select('search', 'gskcrypt.*\.rpm$')
              | reject('search', '_pd\.rpm$')
              | sort | last }}
      when: extracted_files is defined and extracted_files.files | length > 0
      register: gskcrypt_install_result
      ignore_errors: true
      changed_when: gskcrypt_install_result.rc == 0

    # Installing GSKit SSL library (gskssl) - use -Uvh to upgrade if already installed
    # Sort by path to get the latest version (higher version number comes last)
    - name: Install or upgrade GSKit SSL library (gskssl)
      ansible.builtin.command: "rpm -Uvh {{ item }}"
      with_items: >
        {{ extracted_files.files | map(attribute='path')
              | select('search', 'gskssl.*\.rpm$')
              | reject('search', '_pd\.rpm$')
              | sort | last }}
      when: extracted_files.files is defined and extracted_files.files | length > 0
      register: gskssl_install_result
      ignore_errors: true
      changed_when: gskssl_install_result.rc == 0

    # Install Perl and required Perl modules for BA client
    - name: Install Perl and required modules for BA client
      ansible.builtin.package:
        name:
          - perl
          - perl-Env
          - perl-Sys-Syslog
        state: present
      ignore_errors: true

    # Installing TIVsm packages individually (API64, APIcit, BA, BAcit, HSM)
    # Use rpm -Uvh to support both fresh install and upgrade scenarios
    - name: Install or upgrade API64 package
      ansible.builtin.command: "rpm -Uvh --nodeps {{ item }}"
      with_items: "{{ extracted_files.files | map(attribute='path') | select('search', 'TIVsm-API64\\.') | list }}"
      register: api64_install_result
      ignore_errors: false
      changed_when: api64_install_result.rc == 0

    - name: Install or upgrade APIcit package
      ansible.builtin.command: "rpm -Uvh --nodeps {{ item }}"
      with_items: "{{ extracted_files.files | map(attribute='path') | select('search', 'TIVsm-APIcit\\.') | list }}"
      register: apicit_install_result
      ignore_errors: false
      changed_when: apicit_install_result.rc == 0

    # Installing BA packages (TIVsm-BA, TIVsm-BAcit)
    - name: Install or upgrade BA package
      ansible.builtin.command: "rpm -Uvh --nodeps {{ item }}"
      with_items: "{{ extracted_files.files | map(attribute='path') | select('search', 'TIVsm-BA\\.') | list }}"
      register: ba_install_result
      ignore_errors: false
      changed_when: ba_install_result.rc == 0

    - name: Install or upgrade BAcit package
      ansible.builtin.command: "rpm -Uvh --nodeps {{ item }}"
      with_items: "{{ extracted_files.files | map(attribute='path') | select('search', 'TIVsm-BAcit\\.') | list }}"
      register: bacit_install_result
      ignore_errors: false
      changed_when: bacit_install_result.rc == 0

    # Installing HSM package (TIVsm-HSM)
    - name: Install or upgrade HSM package
      ansible.builtin.command: "rpm -Uvh --nodeps {{ item }}"
      with_items: "{{ extracted_files.files | map(attribute='path') | select('search', 'TIVsm-HSM\\.') | list }}"
      register: hsm_install_result
      ignore_errors: false
      changed_when: hsm_install_result.rc == 0

#    ==== if any error occurs while installing the packages =====
#  ===  like if package is corrupted, then role will uninstall all the packages which were installed in previous step ===
#  ===  to maintain the state of the system ===
  rescue:
    - name: Define package uninstall order
      ansible.builtin.set_fact:
        uninstall_packages:
          - "TIVsm-HSM"
          - "TIVsm-BAcit"
          - "TIVsm-BA"
          - "TIVsm-APIcit"
          - "TIVsm-API64"
          - "gskssl64"
          - "gskcrypt64"

    - name: Debug all registered variables
      ansible.builtin.debug:
        msg: |
          gskcrypt_install_result: {{ gskcrypt_install_result | default('undefined') }}
          gskssl_install_result: {{ gskssl_install_result | default('undefined') }}
          api64_install_result: {{ api64_install_result | default('undefined') }}
          apicit_install_result: {{ apicit_install_result | default('undefined') }}
          ba_install_result: {{ ba_install_result | default('undefined') }}
          bacit_install_result: {{ bacit_install_result | default('undefined') }}
          hsm_install_result: {{ hsm_install_result | default('undefined') }}

    - name: Uninstall all packages to restore original state
      ansible.builtin.command: "rpm -e {{ item }}"
      with_items: "{{ uninstall_packages }}"
      ignore_errors: true
      changed_when: true

    - name: Installation status summary
      ansible.builtin.set_fact:
        is_installation_successful: false

    - name: Fail the installation process
      ansible.builtin.fail:
        msg: >
          Installation failed. All packages have been uninstalled to restore system state.
          Debug information:
          gskcrypt_install_result: {{ gskcrypt_install_result | default('undefined') }}
          gskssl_install_result: {{ gskssl_install_result | default('undefined') }}
          api64_install_result: {{ api64_install_result | default('undefined') }}
          apicit_install_result: {{ apicit_install_result | default('undefined') }}
          ba_install_result: {{ ba_install_result | default('undefined') }}
          bacit_install_result: {{ bacit_install_result | default('undefined') }}
          hsm_install_result: {{ hsm_install_result | default('undefined') }}

      when: hsm_client_action == "install"

# ============ Post-checks to verify the installation of HSM client ==========
- name: Verify HSM Client installation
  ansible.builtin.command: rpm -q TIVsm-HSM
  register: installation_check
  ignore_errors: true
  changed_when: installation_check.rc == 0

- name: Display HSM Client installation status
  ansible.builtin.debug:
    msg: |
      HSM Client {{ hsm_client_version }} installation status: {{ "Installed Successfully" if installation_check.rc == 0 else "Not Installed" }}

- name: Mark install.yml as failed if verification fails
  ansible.builtin.fail:
    msg: "HSM Client installation verification failed. Please check logs."
  when: installation_check.rc != 0 and hsm_client_action == "install"

# ============ 'is_installation_successful' fact is used in hsm_client_upgrade_linux.yml =======

- name: Installation status summary
  ansible.builtin.set_fact:
    is_installation_successful: "{{ installation_check.rc == 0 }}"

# =============== HSM Service Information =============
# Note: HSM does not use systemd service (dsmhsm.service)
# HSM uses /etc/rc.gpfshsm script and integrates with GPFS
# HSM daemons start automatically when GPFS filesystem with HSM is mounted

- name: Display HSM service information
  ansible.builtin.debug:
    msg: |
      ========================================
      HSM Service Information
      ========================================
      HSM does not use systemd service (dsmhsm.service).
      HSM uses /etc/rc.gpfshsm script and integrates with GPFS.
      HSM daemons will start automatically when:
      1. GPFS filesystem is mounted
      2. HSM is enabled on the filesystem (mmchfs <fs> -z yes)
      
      To start HSM manually:
        /etc/rc.gpfshsm start
      
      To check HSM status:
        ps aux | grep dsm
      ========================================
...

