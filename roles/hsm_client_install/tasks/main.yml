# ========================================================================
# Flow:
# if state == 'present'
#   1) local_repo_check.yml :- validates whether the passed version is available in local repo on control node.
#   2) determine_action.yml :- checks if HSM Client is already installed
#      if already installed with same version, role execution is stopped
#      if not installed, hsm_client_action is set to 'install'
#   3) gpfs_prerequisite_check.yml :- validates that GPFS (IBM Spectrum Scale) is installed (REQUIRED for HSM)
#   4) system_info :- this role collects the system facts, which are used to perform pre-checks on remote vm's
#   5) if hsm_client_action == 'install' :- hsm_client_install_linux.yml or hsm_client_install_aix.yml is executed
#
# ========================================================================
# if state == 'absent'
#   1) hsm_client_uninstall_linux.yml or hsm_client_uninstall_aix.yml is executed
---
# Detect actual OS using uname (more reliable than Ansible facts for AIX)
- name: Detect operating system using uname
  ansible.builtin.command: uname -s
  register: uname_result
  changed_when: false

- name: Set OS type fact
  ansible.builtin.set_fact:
    detected_os: "{{ 'AIX' if 'AIX' in uname_result.stdout else 'Linux' }}"

- name: Display detected OS
  ansible.builtin.debug:
    msg: "Detected OS: {{ detected_os }}"

- name: Set hsm_client_action dynamically based on state
  ansible.builtin.include_tasks: local_repo_check.yml
  when: hsm_client_state == "present"

- name: Set hsm_client_action dynamically based on state
  ansible.builtin.include_tasks: determine_action.yml
  when: hsm_client_state == "present"

- name: Check GPFS prerequisite (required for HSM)
  ansible.builtin.include_tasks: gpfs_prerequisite_check.yml
  when: hsm_client_action is defined and hsm_client_state == "present"

- name: Gather system info for compatibility checks
  ansible.builtin.include_role:
    name: system_info
  when: hsm_client_action is defined and hsm_client_state == "present"

- name: Run install tasks (AIX)
  ansible.builtin.include_tasks: hsm_client_install_aix.yml
  when:
    - hsm_client_action is defined
    - hsm_client_action == "install"
    - hsm_client_state == "present"
    - detected_os == "AIX"

- name: Run install tasks (Linux)
  ansible.builtin.include_tasks: hsm_client_install_linux.yml
  when:
    - hsm_client_action is defined
    - hsm_client_action == "install"
    - hsm_client_state == "present"
    - detected_os == "Linux"

- name: Run uninstall tasks (AIX)
  ansible.builtin.include_tasks: hsm_client_uninstall_aix.yml
  when:
    - hsm_client_state == "absent"
    - detected_os == "AIX"

- name: Run uninstall tasks (Linux)
  ansible.builtin.include_tasks: hsm_client_uninstall_linux.yml
  when:
    - hsm_client_state == "absent"
    - detected_os == "Linux"

