---
# Uninstall HSM Client and all related packages (including BA Client if present)
- name: Check if HSM Client is installed
  ansible.builtin.command: rpm -q TIVsm-HSM
  register: hsm_uninstall_check
  ignore_errors: true
  changed_when: false

- name: Check if BA Client is installed
  ansible.builtin.command: rpm -q TIVsm-BA
  register: ba_uninstall_check
  ignore_errors: true
  changed_when: false

- name: Check if API64 is installed
  ansible.builtin.command: rpm -q TIVsm-API64
  register: api_uninstall_check
  ignore_errors: true
  changed_when: false

- name: Check for any TIVsm packages
  ansible.builtin.command: rpm -qa 'TIVsm*'
  register: any_tivoli_packages
  ignore_errors: true
  changed_when: false

# Extract version from any installed TIVsm package (HSM, BA, or API)
- name: Extract installed version from HSM package
  ansible.builtin.set_fact:
    installed_version: "{{ hsm_uninstall_check.stdout | regex_search('TIVsm-HSM-([0-9.]+)', '\\1') | first | default('') }}"
  when: hsm_uninstall_check.rc == 0

- name: Extract installed version from BA package
  ansible.builtin.set_fact:
    installed_version: "{{ ba_uninstall_check.stdout | regex_search('TIVsm-BA-([0-9.]+)', '\\1') | first | default('') }}"
  when:
    - hsm_uninstall_check.rc != 0
    - ba_uninstall_check.rc == 0

- name: Extract installed version from API64 package
  ansible.builtin.set_fact:
    installed_version: "{{ api_uninstall_check.stdout | regex_search('TIVsm-API64-([0-9.]+)', '\\1') | first | default('') }}"
  when:
    - hsm_uninstall_check.rc != 0
    - ba_uninstall_check.rc != 0
    - api_uninstall_check.rc == 0

- name: Display installation status
  ansible.builtin.debug:
    msg: |
      ========================================
      Installed TIVsm Packages Status
      ========================================
      HSM Client: {{ 'Installed' if hsm_uninstall_check.rc == 0 else 'Not installed' }}
      BA Client: {{ 'Installed' if ba_uninstall_check.rc == 0 else 'Not installed' }}
      API64: {{ 'Installed' if api_uninstall_check.rc == 0 else 'Not installed' }}
      
      Detected version: {{ installed_version | default('N/A') }}
      Requested uninstall version: {{ hsm_client_version | default('Not specified') }}
      
      All TIVsm packages found:
      {{ any_tivoli_packages.stdout_lines | join('\n      ') if any_tivoli_packages.stdout_lines | length > 0 else '      None' }}
      ========================================

- name: Skip uninstallation if nothing is installed
  ansible.builtin.meta: end_play
  when: any_tivoli_packages.stdout_lines | length == 0

# Version mismatch check - fail if trying to uninstall a different version
- name: Check for version mismatch
  ansible.builtin.fail:
    msg: |
      ========================================
      ❌ Version Mismatch - Cannot Uninstall
      ========================================
      Installed TIVsm version: {{ installed_version }}
      Requested uninstall version: {{ hsm_client_version }}
      
      The installed version does not match the requested uninstall version.
      
      Installed packages:
      {{ any_tivoli_packages.stdout_lines | join('\n      ') }}
      
      To uninstall the currently installed version, use:
        -e "hsm_client_version={{ installed_version }}"
      
      Or to uninstall regardless of version:
        -e "force_uninstall=true"
      ========================================
  when:
    - hsm_client_version is defined
    - hsm_client_version != ''
    - installed_version is defined
    - installed_version != ''
    - installed_version != hsm_client_version
    - not (force_uninstall | default(false))

# Stop HSM daemon/service
- name: Stop dsmhsm service
  ansible.builtin.systemd:
    name: dsmhsm.service
    state: stopped
  ignore_errors: true

- name: Kill any running HSM processes
  ansible.builtin.command: killall dsmhsm
  ignore_errors: true
  changed_when: false

# Backup configuration files before uninstall to a safe location
- name: Create backup directory for configuration files
  ansible.builtin.file:
    path: /var/backups/hsm
    state: directory
    mode: '0755'

- name: Backup dsm.opt configuration file
  ansible.builtin.copy:
    src: /opt/tivoli/tsm/client/hsm/bin/dsm.opt
    dest: /var/backups/hsm/dsm.opt.{{ ansible_date_time.iso8601_basic_short }}
    remote_src: true
  ignore_errors: true
  register: dsm_opt_backup

- name: Backup dsm.sys configuration file
  ansible.builtin.copy:
    src: /opt/tivoli/tsm/client/hsm/bin/dsm.sys
    dest: /var/backups/hsm/dsm.sys.{{ ansible_date_time.iso8601_basic_short }}
    remote_src: true
  ignore_errors: true
  register: dsm_sys_backup

- name: Backup BA client configuration if exists
  ansible.builtin.copy:
    src: /opt/tivoli/tsm/client/ba/bin/dsm.opt
    dest: /var/backups/hsm/ba_dsm.opt.{{ ansible_date_time.iso8601_basic_short }}
    remote_src: true
  ignore_errors: true
  when: ba_uninstall_check.rc == 0

- name: Display backup location
  ansible.builtin.debug:
    msg: |
      ========================================
      Configuration Backups Created
      ========================================
      Backup location: /var/backups/hsm/
      Files backed up:
      {{ '  - dsm.opt.' + ansible_date_time.iso8601_basic_short if dsm_opt_backup.changed else '  - dsm.opt (not found or failed)' }}
      {{ '  - dsm.sys.' + ansible_date_time.iso8601_basic_short if dsm_sys_backup.changed else '  - dsm.sys (not found or failed)' }}
      ========================================

# Create backup directory for RPMs
- name: Create backup directory for RPM packages
  ansible.builtin.file:
    path: /opt/hsmClientPackagesBk
    state: directory
    mode: '0755'

# Backup RPM packages from extraction directory
- name: Find RPM files in extraction directory
  ansible.builtin.find:
    paths: /opt/hsmClient
    patterns: "*.rpm"
    recurse: true
  register: rpm_files_to_backup
  ignore_errors: true

- name: Backup RPM files
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: /opt/hsmClientPackagesBk/
    remote_src: true
  loop: "{{ rpm_files_to_backup.files }}"
  when: rpm_files_to_backup.files is defined and rpm_files_to_backup.files | length > 0
  ignore_errors: true

# Define uninstall order (reverse of install order) - includes both HSM and BA packages
- name: Define package uninstall order
  ansible.builtin.set_fact:
    uninstall_packages:
      - "TIVsm-HSM"        # HSM Client
      - "TIVsm-BA"         # BA Client
      - "TIVsm-BAcit"      # BA Client CIT
      - "TIVsm-APIcit"     # API CIT
      - "TIVsm-API64"      # API 64-bit
      - "gskssl64"         # GSKit SSL
      - "gskcrypt64"       # GSKit Crypto

# Uninstall packages
- name: Uninstall HSM Client packages
  block:
    - name: Check and uninstall each package
      ansible.builtin.command: "rpm -e {{ item }}"
      loop: "{{ uninstall_packages }}"
      register: uninstall_results
      ignore_errors: true
      changed_when: uninstall_results.rc == 0

    - name: Display uninstall results
      ansible.builtin.debug:
        msg: "Package {{ item.item }} uninstall result: {{ 'Success' if item.rc == 0 else 'Failed or not installed' }}"
      loop: "{{ uninstall_results.results }}"
      when: uninstall_results is defined

  rescue:
    - name: Handle uninstall failure
      ansible.builtin.debug:
        msg: "Some packages failed to uninstall. Attempting force removal."

    - name: Force uninstall packages
      ansible.builtin.command: "rpm -e --nodeps {{ item }}"
      loop: "{{ uninstall_packages }}"
      ignore_errors: true
      changed_when: true

# Verify uninstallation
- name: Verify HSM Client uninstallation
  ansible.builtin.command: rpm -q TIVsm-HSM
  register: verify_hsm_uninstall
  ignore_errors: true
  changed_when: false

- name: Verify BA Client uninstallation
  ansible.builtin.command: rpm -q TIVsm-BA
  register: verify_ba_uninstall
  ignore_errors: true
  changed_when: false

- name: Display uninstallation status
  ansible.builtin.debug:
    msg: |
      HSM Client: {{ 'Successfully removed' if verify_hsm_uninstall.rc != 0 else 'Still present (or was not installed)' }}
      BA Client: {{ 'Successfully removed' if verify_ba_uninstall.rc != 0 else 'Still present (or was not installed)' }}

- name: Check for remaining TIVsm packages
  ansible.builtin.command: rpm -qa 'TIVsm*'
  register: remaining_packages
  changed_when: false
  ignore_errors: true

- name: Display remaining packages
  ansible.builtin.debug:
    msg: "Remaining TIVsm packages: {{ remaining_packages.stdout_lines if remaining_packages.stdout_lines | length > 0 else 'None - All packages removed successfully' }}"

# Cleanup extraction directory
- name: Remove extraction directory
  ansible.builtin.file:
    path: /opt/hsmClient
    state: absent
  ignore_errors: true

# Cleanup backup directory (only if uninstall was successful)
- name: Remove backup directory after successful uninstall
  ansible.builtin.file:
    path: /opt/hsmClientPackagesBk
    state: absent
  when: verify_hsm_uninstall.rc != 0
  ignore_errors: true

# Clean up tar file from /tmp (enabled by default)
- name: Check if tar file exists in /tmp
  ansible.builtin.stat:
    path: "/tmp/{{ hsm_client_version }}-TIV-TSMHSM-LinuxX86.tar"
  register: tar_file_check
  when: hsm_client_version is defined

- name: Remove tar file from /tmp (automatic cleanup)
  ansible.builtin.file:
    path: "/tmp/{{ hsm_client_version }}-TIV-TSMHSM-LinuxX86.tar"
    state: absent
  when:
    - hsm_client_version is defined
    - tar_file_check.stat.exists | default(false)
    - cleanup_tar_file | default(true)
  register: tar_cleanup

- name: Display tar file cleanup status
  ansible.builtin.debug:
    msg: "Tar file removed from /tmp/{{ hsm_client_version }}-TIV-TSMHSM-LinuxX86.tar"
  when:
    - tar_cleanup is defined
    - tar_cleanup.changed

- name: Uninstallation complete
  ansible.builtin.debug:
    msg: |
      ========================================
      ✅ HSM/BA Client Uninstallation Complete
      ========================================
      Configuration backups saved to: /var/backups/hsm/
      
      To restore configurations later:
        cp /var/backups/hsm/dsm.opt.* /opt/tivoli/tsm/client/hsm/bin/dsm.opt
        cp /var/backups/hsm/dsm.sys.* /opt/tivoli/tsm/client/hsm/bin/dsm.sys
      
      Tar file: {{ 'Removed from /tmp/' if (tar_cleanup is defined and tar_cleanup.changed) else 'Not found in /tmp/ or retained (use -e cleanup_tar_file=false to keep)' }}
      ========================================
...
